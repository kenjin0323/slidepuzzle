<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>フォトスライドパズル</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Segoe UI', Meiryo, sans-serif;
  background: #12121f;
  color: #eee;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

.screen { display: none; flex-direction: column; align-items: center; gap: 24px; padding: 40px 24px; }
.screen.active { display: flex; }

h1 {
  font-size: 2rem;
  background: linear-gradient(135deg, #a78bfa, #ec4899);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.subtitle { color: #888; font-size: 0.95rem; }

.drop-zone {
  width: 340px; height: 210px;
  border: 2px dashed #444;
  border-radius: 18px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  transition: border-color 0.2s, background 0.2s;
}
.drop-zone:hover, .drop-zone.dragover {
  border-color: #a78bfa;
  background: rgba(167,139,250,0.07);
}
.drop-inner { display: flex; flex-direction: column; align-items: center; gap: 10px; text-align: center; }
.drop-icon  { font-size: 3.2rem; }
.drop-hint  { color: #888; font-size: 0.88rem; line-height: 1.7; }

#preview-area { flex-direction: column; align-items: center; gap: 16px; }
#preview-img {
  width: 280px; height: 280px;
  object-fit: cover; border-radius: 14px;
  border: 3px solid #a78bfa;
  box-shadow: 0 0 24px rgba(167,139,250,0.4);
}
.preview-btns { display: flex; gap: 12px; }

/* ===================== 難易度モーダル ===================== */
#diff-modal {
  position: fixed; inset: 0;
  display: flex; align-items: center; justify-content: center;
  z-index: 200;
  background: rgba(0,0,0,0.65);
  backdrop-filter: blur(6px);
}
.diff-card {
  background: rgba(18,18,31,0.98);
  border: 2px solid #a78bfa;
  border-radius: 24px;
  padding: 40px 48px;
  display: flex; flex-direction: column; align-items: center; gap: 20px;
  animation: pop-in 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
  box-shadow: 0 0 60px rgba(167,139,250,0.2), 0 20px 50px rgba(0,0,0,0.6);
}
.diff-card h2 { font-size: 1.5rem; font-weight: 700; }
.diff-card > p { color: #888; font-size: 0.88rem; margin-top: -8px; }
.diff-options  { display: flex; gap: 16px; }
.diff-btn {
  display: flex; flex-direction: column; align-items: center; gap: 8px;
  width: 112px; padding: 20px 12px;
  background: #1e1e32;
  border: 2px solid #333 !important;
  border-radius: 16px !important;
  cursor: pointer;
  transition: all 0.2s !important;
}
.diff-btn:hover {
  border-color: #a78bfa !important;
  background: rgba(167,139,250,0.12) !important;
  transform: translateY(-6px) !important;
  filter: none !important;
  box-shadow: 0 10px 28px rgba(167,139,250,0.25);
}
.diff-btn:active { transform: translateY(-2px) !important; filter: none !important; }
.diff-recommended { border-color: #a78bfa !important; background: rgba(167,139,250,0.08) !important; }
.diff-emoji  { font-size: 2.2rem; pointer-events: none; }
.diff-size   { font-size: 1.45rem; font-weight: 700; color: #a78bfa; pointer-events: none; }
.diff-name   { font-size: 0.82rem; font-weight: 600; color: #ccc; pointer-events: none; }
.diff-pieces { font-size: 0.73rem; color: #666; pointer-events: none; }
.diff-rec-badge {
  font-size: 0.63rem; font-weight: 700;
  background: linear-gradient(135deg, #a78bfa, #ec4899);
  color: #fff; padding: 2px 8px; border-radius: 10px;
  pointer-events: none;
}

/* ===================== シェア確認モーダル ===================== */
#share-modal {
  position: fixed; inset: 0;
  display: flex; align-items: center; justify-content: center;
  z-index: 250;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(6px);
}
.share-card {
  background: rgba(18,18,31,0.98);
  border: 2px solid #06C755;
  border-radius: 24px;
  padding: 40px 48px;
  display: flex; flex-direction: column; align-items: center; gap: 20px;
  animation: pop-in 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
  box-shadow: 0 0 60px rgba(6,199,85,0.2), 0 20px 50px rgba(0,0,0,0.6);
  max-width: 400px; text-align: center;
}
.share-card h2 { font-size: 1.5rem; }
.share-generating { color: #888; font-size: 1rem; }
.share-steps {
  background: #1a1a2e;
  border-radius: 12px;
  padding: 16px 20px;
  text-align: left;
  width: 100%;
  display: flex; flex-direction: column; gap: 10px;
}
.share-steps p { font-size: 0.9rem; color: #ccc; display: flex; gap: 8px; align-items: flex-start; }
.share-steps .step-num {
  background: #06C755; color: #000;
  font-weight: 700; font-size: 0.75rem;
  min-width: 20px; height: 20px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; margin-top: 1px;
}
.share-note { color: #666; font-size: 0.8rem; line-height: 1.6; }
.share-filename {
  background: #1e1e32; border: 1px solid #333;
  border-radius: 8px; padding: 8px 16px;
  font-family: monospace; color: #a78bfa; font-size: 0.95rem;
}

/* ===================== ゲーム画面 ===================== */
.game-wrapper { display: flex; flex-direction: column; gap: 16px; }
.game-header {
  display: flex; align-items: center; justify-content: space-between;
  width: 628px;
}
.stats { display: flex; gap: 24px; align-items: center; font-size: 0.95rem; }
.stats strong { color: #f472b6; font-size: 1.3rem; }
.grid-badge {
  background: rgba(167,139,250,0.15);
  border: 1px solid rgba(167,139,250,0.4);
  color: #a78bfa; padding: 3px 13px;
  border-radius: 20px; font-size: 0.85rem; font-weight: 700;
}
.g-controls { display: flex; gap: 8px; }
.game-area { display: flex; gap: 20px; align-items: flex-start; }

#puzzle-board {
  position: relative;
  width: 480px; height: 480px;
  background: #0a0a14;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 16px 48px rgba(0,0,0,0.7);
  flex-shrink: 0;
}
.tile {
  position: absolute; left: 0; top: 0;
  cursor: pointer;
  will-change: transform;
  transition: transform 0.13s cubic-bezier(0.25,0.46,0.45,0.94);
  outline: 1.5px solid rgba(255,255,255,0.07);
}
.tile:hover  { filter: brightness(1.14) drop-shadow(0 0 6px rgba(167,139,250,0.5)); }
.tile:active { filter: brightness(0.92); }

.preview-panel { display: flex; flex-direction: column; align-items: center; gap: 6px; }
.preview-label { font-size: 0.72rem; color: #666; letter-spacing: 0.06em; text-transform: uppercase; }
#thumb-img {
  width: 128px; height: 128px;
  object-fit: cover; border-radius: 10px;
  border: 2px solid #2a2a3e;
}

/* ===================== お祝い ===================== */
#celebration {
  position: fixed; inset: 0;
  display: flex; align-items: center; justify-content: center;
  z-index: 300; background: rgba(0,0,0,0.25);
}
#confetti-canvas { position: absolute; inset: 0; pointer-events: none; }
.cel-card {
  position: relative;
  background: rgba(18,18,31,0.97);
  border: 2px solid #a78bfa;
  border-radius: 26px;
  padding: 52px 64px;
  text-align: center;
  display: flex; flex-direction: column; align-items: center; gap: 14px;
  animation: pop-in 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
  box-shadow: 0 0 80px rgba(167,139,250,0.3), 0 24px 60px rgba(0,0,0,0.6);
}
.cel-emoji { font-size: 4rem; animation: bob 0.7s ease-in-out infinite alternate; }
.cel-card h2 { font-size: 2.4rem; font-weight: 700; }
.cel-stats { color: #aaa; font-size: 1.05rem; line-height: 2.1; }
.cel-stats strong { color: #f472b6; }
.cel-buttons { display: flex; gap: 12px; margin-top: 10px; }

@keyframes pop-in {
  from { transform: scale(0.3) rotate(-8deg); opacity: 0; }
  to   { transform: scale(1)   rotate(0deg);  opacity: 1; }
}
@keyframes bob {
  from { transform: translateY(0); }
  to   { transform: translateY(-14px); }
}

/* ===================== ボタン共通 ===================== */
button {
  padding: 10px 22px; border: none; border-radius: 10px;
  font-size: 0.95rem; font-weight: 600; cursor: pointer;
  transition: transform 0.1s, filter 0.15s;
}
button:hover  { filter: brightness(1.12); transform: translateY(-2px); }
button:active { transform: translateY(0);  filter: brightness(0.94); }
.btn-primary { background: linear-gradient(135deg, #a78bfa, #ec4899); color: #fff; }
.btn-success { background: linear-gradient(135deg, #34d399, #059669); color: #fff; }
.btn-dark    { background: #23233a; color: #ccc; border: 1px solid #3a3a5c; }
.btn-line    { background: #06C755; color: #fff; }
</style>
</head>
<body>

<!-- ========================================================
     画像選択画面
======================================================== -->
<div id="screen-select" class="screen active">
  <h1>📸 フォトスライドパズル</h1>
  <p class="subtitle">自分の写真でスライドパズルを楽しもう</p>

  <div class="drop-zone" id="drop-zone">
    <input type="file" id="file-input" accept="image/*" hidden>
    <div class="drop-inner">
      <div class="drop-icon">🖼️</div>
      <p class="drop-hint">写真をここにドラッグ＆ドロップ<br>または</p>
      <button type="button" class="btn-primary" id="select-btn">ファイルを選択</button>
    </div>
  </div>

  <div id="preview-area" style="display:none">
    <img id="preview-img" alt="選択した写真のプレビュー">
    <div class="preview-btns">
      <button type="button" class="btn-success" id="start-btn"
              style="padding:14px 28px;font-size:1rem;border-radius:28px">
        ▶ ここで遊ぶ
      </button>
      <button type="button" class="btn-line" id="share-btn"
              style="padding:14px 28px;font-size:1rem;border-radius:28px">
        📤 LINEで送る
      </button>
    </div>
  </div>
</div>

<!-- ========================================================
     難易度選択モーダル
======================================================== -->
<div id="diff-modal" style="display:none">
  <div class="diff-card">
    <h2 id="diff-title">グリッドサイズを選択</h2>
    <p id="diff-sub">大きいほど難しくなります</p>
    <div class="diff-options">
      <button type="button" class="diff-btn" data-cols="3">
        <span class="diff-emoji">😊</span>
        <span class="diff-size">3 × 3</span>
        <span class="diff-name">かんたん</span>
        <span class="diff-pieces">8 ピース</span>
      </button>
      <button type="button" class="diff-btn diff-recommended" data-cols="4">
        <span class="diff-emoji">🧩</span>
        <span class="diff-size">4 × 4</span>
        <span class="diff-name">ふつう</span>
        <span class="diff-pieces">15 ピース</span>
        <span class="diff-rec-badge">おすすめ</span>
      </button>
      <button type="button" class="diff-btn" data-cols="5">
        <span class="diff-emoji">🔥</span>
        <span class="diff-size">5 × 5</span>
        <span class="diff-name">むずかしい</span>
        <span class="diff-pieces">24 ピース</span>
      </button>

</div>

<!-- ========================================================
     シェア確認モーダル
======================================================== -->
<div id="share-modal" style="display:none">
  <div class="share-card">
    <div id="share-content">
      <p class="share-generating">⏳ パズルファイルを作成中...</p>
    </div>
    <button type="button" class="btn-dark" id="share-close-btn">閉じる</button>
  </div>
</div>

<!-- ========================================================
     ゲーム画面
======================================================== -->
<div id="screen-game" class="screen">
  <div class="game-wrapper">
    <div class="game-header">
      <div class="stats">
        <span class="grid-badge" id="grid-badge">4×4</span>
        <span>手数&thinsp;<strong id="move-count">0</strong></span>
        <span>時間&thinsp;<strong id="timer">00:00</strong></span>

      <div class="g-controls">
        <button type="button" class="btn-primary" id="shuffle-btn">🔀 シャッフル</button>
        <button type="button" class="btn-dark"    id="back-btn">← 戻る</button>

    </div>
    <div class="game-area">
      <div id="puzzle-board"></div>
      <div class="preview-panel">
        <span class="preview-label">完成図</span>
        <img id="thumb-img" alt="完成図">
      </div>

  </div>
</div>

<!-- ========================================================
     お祝いオーバーレイ
======================================================== -->
<div id="celebration" style="display:none">
  <canvas id="confetti-canvas"></canvas>
  <div class="cel-card">
    <div class="cel-emoji">🎊</div>
    <h2>パズル完成！</h2>
    <p class="cel-stats" id="result-text"></p>
    <div class="cel-buttons">
      <button type="button" class="btn-success" id="play-again-btn">🔀 もう一度遊ぶ</button>
      <button type="button" class="btn-dark"    id="new-photo-btn">📷 別の写真</button>
    </div>
  </div>
</div>

<script>
'use strict';

// ── LIFF ──────────────────────────────────────
const LIFF_ID = '2009936757-HcECEkM1';
if (typeof liff !== 'undefined') {
  liff.init({ liffId: LIFF_ID }).catch(() => {});
}

// ── 定数・変数 ────────────────────────────────
const BOARD_PX = 480;
let COLS = 4, ROWS = 4, N = 16, EMPTY_ID = 15, TILE_PX = 120;

function setDifficulty(cols) {
  COLS = cols; ROWS = cols;
  N = cols * cols; EMPTY_ID = N - 1; TILE_PX = BOARD_PX / cols;
}

let state = [], imageUrl = '', moves = 0;
let startTime = null, timerID = null, confettiID = null;
let diffMode = 'play'; // 'play' | 'share'

// ── ユーティリティ ────────────────────────────
const $ = id => document.getElementById(id);
const r = pos => Math.floor(pos / COLS);
const c = pos => pos % COLS;

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  $(id).classList.add('active');
}

function neighbors(pos) {
  const res = [];
  if (r(pos) > 0)      res.push(pos - COLS);
  if (r(pos) < ROWS-1) res.push(pos + COLS);
  if (c(pos) > 0)      res.push(pos - 1);
  if (c(pos) < COLS-1) res.push(pos + 1);
  return res;
}

// ── 画像処理 ──────────────────────────────────
function loadImageFile(file) {
  const reader = new FileReader();
  reader.onload = evt => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      canvas.width = canvas.height = BOARD_PX;
      const ctx = canvas.getContext('2d');
      const dim = Math.min(img.width, img.height);
      ctx.drawImage(img, (img.width-dim)/2, (img.height-dim)/2, dim, dim, 0, 0, BOARD_PX, BOARD_PX);
      imageUrl = canvas.toDataURL('image/jpeg', 0.92);
      $('preview-img').src = imageUrl;
      $('preview-area').style.display = 'flex';
    };
    img.src = evt.target.result;
  };
  reader.readAsDataURL(file);
}

// ── パズル状態 ────────────────────────────────
function initSolved() { state = Array.from({length: N}, (_, i) => i); }

function shuffleState() {
  const steps = Math.max(80, N * 22);
  do {
    initSolved();
    let empty = state.indexOf(EMPTY_ID), prev = -1;
    for (let i = 0; i < steps; i++) {
      const nb = neighbors(empty).filter(p => p !== prev);
      const next = nb[(Math.random() * nb.length) | 0];
      [state[empty], state[next]] = [state[next], state[empty]];
      prev = empty; empty = next;
    }
  } while (isSolved());
}

function isSolved() { return state.every((id, pos) => id === pos); }

// ── タイル DOM ────────────────────────────────
function buildBoard() {
  const board = $('puzzle-board');
  board.innerHTML = '';
  for (let id = 0; id < EMPTY_ID; id++) {
    const div = document.createElement('div');
    div.className = 'tile';
    div.dataset.id = id;
    div.style.width  = TILE_PX + 'px';
    div.style.height = TILE_PX + 'px';
    div.style.backgroundImage    = 'url("' + imageUrl + '")';
    div.style.backgroundSize     = BOARD_PX + 'px ' + BOARD_PX + 'px';
    div.style.backgroundPosition = '-' + (id % COLS * TILE_PX) + 'px -' + (Math.floor(id / COLS) * TILE_PX) + 'px';
    div.addEventListener('click', () => clickTile(id));
    board.appendChild(div);
  }
}

function renderBoard(animate = true) {
  const board = $('puzzle-board');
  for (let id = 0; id < EMPTY_ID; id++) {
    const pos = state.indexOf(id);
    const el  = board.querySelector('[data-id="' + id + '"]');
    if (!el) continue;
    el.style.transition = animate ? 'transform 0.13s cubic-bezier(0.25,0.46,0.45,0.94)' : 'none';
    el.style.transform  = 'translate(' + (c(pos) * TILE_PX) + 'px,' + (r(pos) * TILE_PX) + 'px)';
  }
}

// ── クリック ──────────────────────────────────
function clickTile(id) {
  const tilePos = state.indexOf(id), emptyPos = state.indexOf(EMPTY_ID);
  if (!neighbors(emptyPos).includes(tilePos)) return;
  [state[emptyPos], state[tilePos]] = [state[tilePos], state[emptyPos]];
  moves++;
  $('move-count').textContent = moves;
  renderBoard(true);
  if (isSolved()) setTimeout(celebrate, 160);
}

// ── ゲーム開始 ────────────────────────────────
function startGame() {
  $('grid-badge').textContent = COLS + '×' + COLS;
  $('thumb-img').src = imageUrl;
  buildBoard(); shuffleState(); resetStats(); renderBoard(false);
  showScreen('screen-game');
}

function resetStats() {
  moves = 0;
  $('move-count').textContent = '0';
  $('timer').textContent = '00:00';
  stopTimer(); startTimer();
}

// ── タイマー ──────────────────────────────────
function startTimer() {
  startTime = Date.now();
  timerID = setInterval(() => {
    const sec = ((Date.now() - startTime) / 1000) | 0;
    $('timer').textContent =
      String((sec / 60) | 0).padStart(2, '0') + ':' + String(sec % 60).padStart(2, '0');
  }, 500);
}
function stopTimer() { clearInterval(timerID); timerID = null; }
function elapsedStr() {
  const sec = ((Date.now() - startTime) / 1000) | 0;
  const m = (sec / 60) | 0;
  return m ? m + '分 ' + (sec % 60) + '秒' : sec + '秒';
}

// ── お祝い ────────────────────────────────────
function celebrate() {
  stopTimer();
  $('result-text').innerHTML =
    '<strong>' + moves + '</strong> 手 ／ <strong>' + elapsedStr() + '</strong> でクリア！🎉';
  $('celebration').style.display = 'flex';
  startConfetti();
}
function hideCelebration() { $('celebration').style.display = 'none'; stopConfetti(); }

// ── コンフェッティ ────────────────────────────
const C_COLORS = ['#a78bfa','#ec4899','#34d399','#60a5fa','#fbbf24','#f87171','#38bdf8','#fb923c'];

function startConfetti() {
  const canvas = $('confetti-canvas');
  canvas.width = window.innerWidth; canvas.height = window.innerHeight;
  const ctx = canvas.getContext('2d');
  const ps = Array.from({length: 220}, () => ({
    x: Math.random() * canvas.width, y: -30 - Math.random() * 400,
    vx: (Math.random() - 0.5) * 5, vy: 1.8 + Math.random() * 4,
    w: 7 + Math.random() * 10, h: 4 + Math.random() * 7,
    rot: Math.random() * Math.PI * 2, rv: (Math.random() - 0.5) * 0.2,
    color: C_COLORS[(Math.random() * C_COLORS.length) | 0],
  }));
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ps.forEach(p => {
      p.x += p.vx; p.y += p.vy; p.vy += 0.06; p.rot += p.rv;
      if (p.y > canvas.height + 20) { p.y = -20; p.x = Math.random() * canvas.width; p.vy = 1.8 + Math.random() * 4; }
      ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.rot);
      ctx.fillStyle = p.color; ctx.globalAlpha = 0.88;
      ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
      ctx.restore();
    });
    confettiID = requestAnimationFrame(draw);
  }
  draw();
}
function stopConfetti() { cancelAnimationFrame(confettiID); confettiID = null; }

// ── パズルファイル生成 ────────────────────────
function generatePuzzleFile(cols) {
  $('share-content').innerHTML = '<p class="share-generating">⏳ パズルファイルを作成中...</p>';
  $('share-modal').style.display = 'flex';

  setTimeout(() => {
    const html = buildPuzzleHtml(imageUrl, cols);
    const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href = url; a.download = 'puzzle.html';
    document.body.appendChild(a); a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);

    $('share-content').innerHTML =
      '<div style="font-size:2.5rem">✅</div>' +
      '<h2 style="font-size:1.3rem;color:#06C755">作成完了！</h2>' +
      '<div class="share-filename">puzzle.html</div>' +
      '<div class="share-steps">' +
        '<p><span class="step-num">1</span>LINEのトーク画面を開く</p>' +
        '<p><span class="step-num">2</span>「＋」→「ファイル」をタップ</p>' +
        '<p><span class="step-num">3</span>ダウンロードした <strong>puzzle.html</strong> を選択して送信</p>' +
      '</div>' +
      '<p class="share-note">受け取った人はファイルをダウンロードして<br>ブラウザで開くとパズルが始まります 🧩</p>';
  }, 80);
}

function buildPuzzleHtml(imgDataUrl, cols) {
  const n = cols * cols;
  const e = n - 1;
  const t = 480 / cols;

  const css = '*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}' +
    'body{font-family:"Segoe UI",Meiryo,sans-serif;background:#12121f;color:#eee;min-height:100vh;display:flex;align-items:center;justify-content:center}' +
    '.wrapper{display:flex;flex-direction:column;gap:16px}' +
    '.header{display:flex;align-items:center;justify-content:space-between;width:628px}' +
    '.stats{display:flex;gap:24px;align-items:center;font-size:.95rem}' +
    '.stats strong{color:#f472b6;font-size:1.3rem}' +
    '.badge{background:rgba(167,139,250,.15);border:1px solid rgba(167,139,250,.4);color:#a78bfa;padding:3px 13px;border-radius:20px;font-size:.85rem;font-weight:700}' +
    '.area{display:flex;gap:20px;align-items:flex-start}' +
    '#board{position:relative;width:480px;height:480px;background:#0a0a14;border-radius:12px;overflow:hidden;box-shadow:0 16px 48px rgba(0,0,0,.7);flex-shrink:0}' +
    '.tile{position:absolute;left:0;top:0;cursor:pointer;will-change:transform;outline:1.5px solid rgba(255,255,255,.07)}' +
    '.tile:hover{filter:brightness(1.14)}' +
    '.preview{display:flex;flex-direction:column;align-items:center;gap:6px}' +
    '.preview span{font-size:.72rem;color:#666;letter-spacing:.06em;text-transform:uppercase}' +
    '#thumb{width:128px;height:128px;object-fit:cover;border-radius:10px;border:2px solid #2a2a3e}' +
    '#cel{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:300;background:rgba(0,0,0,.25)}' +
    '#cc{position:absolute;inset:0;pointer-events:none}' +
    '.cel-card{position:relative;background:rgba(18,18,31,.97);border:2px solid #a78bfa;border-radius:26px;padding:40px 52px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:14px;animation:pop-in .5s cubic-bezier(.34,1.56,.64,1) both;box-shadow:0 0 80px rgba(167,139,250,.3),0 24px 60px rgba(0,0,0,.6)}' +
    '.cel-emoji{font-size:4rem;animation:bob .7s ease-in-out infinite alternate}' +
    '.cel-card h2{font-size:2.2rem;font-weight:700}' +
    '.cel-stats{color:#aaa;font-size:1rem;line-height:2.1}' +
    '.cel-stats strong{color:#f472b6}' +
    '#cel-img{width:260px;height:260px;object-fit:cover;border-radius:12px;border:3px solid #a78bfa;box-shadow:0 0 24px rgba(167,139,250,.4);display:none}' +
    '.cel-btns{display:flex;gap:12px;margin-top:8px}' +
    '@keyframes pop-in{from{transform:scale(.3) rotate(-8deg);opacity:0}to{transform:scale(1) rotate(0);opacity:1}}' +
    '@keyframes bob{from{transform:translateY(0)}to{transform:translateY(-14px)}}' +
    'button{padding:10px 22px;border:none;border-radius:10px;font-size:.95rem;font-weight:600;cursor:pointer;transition:transform .1s,filter .15s}' +
    'button:hover{filter:brightness(1.12);transform:translateY(-2px)}' +
    '.btn-s{background:linear-gradient(135deg,#34d399,#059669);color:#fff}' +
    '.btn-d{background:#23233a;color:#ccc;border:1px solid #3a3a5c}';

  const body =
    '<div class="wrapper">' +
      '<div class="header">' +
        '<div class="stats">' +
          '<span class="badge" id="gb"></span>' +
          '<span>手数&thinsp;<strong id="mc">0</strong></span>' +
          '<span>時間&thinsp;<strong id="tm">00:00</strong></span>' +
        '</div>' +
        '<button type="button" class="btn-d" onclick="replayShuffle()">🔀 シャッフル</button>' +
      '</div>' +
      '<div class="area">' +
        '<div id="board"></div>' +
        '<div class="preview"><span>完成図</span><img id="thumb" alt=""></div>' +
      '</div>' +
    '</div>' +
    '<div id="cel" style="display:none">' +
      '<canvas id="cc"></canvas>' +
      '<div class="cel-card">' +
        '<div class="cel-emoji">🎊</div>' +
        '<h2>パズル完成！</h2>' +
        '<img id="cel-img" alt="">' +
        '<p class="cel-stats" id="result"></p>' +
        '<div class="cel-btns">' +
          '<button type="button" class="btn-s" onclick="savePhoto()">⬇ 写真を保存</button>' +
          '<button type="button" class="btn-d" onclick="replayShuffle()">🔀 もう一度</button>' +
        '</div>' +
      '</div>' +
    '</div>';

  const js =
    'var IMG=' + JSON.stringify(imgDataUrl) + ';' +
    'var C=' + cols + ',BOARD=480,COLS=C,ROWS=C,N=C*C,E=C*C-1,T=480/C;' +
    'var state=[],moves=0,startTime=null,timerID=null,confID=null;' +
    'var $=function(id){return document.getElementById(id);};' +
    'var RR=function(pos){return Math.floor(pos/COLS);};' +
    'var CC=function(pos){return pos%COLS;};' +
    'function nb(pos){var res=[];if(RR(pos)>0)res.push(pos-COLS);if(RR(pos)<ROWS-1)res.push(pos+COLS);if(CC(pos)>0)res.push(pos-1);if(CC(pos)<COLS-1)res.push(pos+1);return res;}' +
    'function initSolved(){state=[];for(var i=0;i<N;i++)state.push(i);}' +
    'function doShuffle(){' +
      'var steps=Math.max(80,N*22);' +
      'do{initSolved();var empty=state.indexOf(E),prev=-1;' +
        'for(var i=0;i<steps;i++){var cands=nb(empty).filter(function(p){return p!==prev;});var next=cands[Math.floor(Math.random()*cands.length)];var tmp=state[empty];state[empty]=state[next];state[next]=tmp;prev=empty;empty=next;}' +
      '}while(solved());}' +
    'function solved(){return state.every(function(id,pos){return id===pos;});}' +
    'function buildBoard(){' +
      'var board=$("board");board.innerHTML="";' +
      'for(var id=0;id<E;id++){' +
        'var div=document.createElement("div");' +
        'div.className="tile";div.dataset.id=id;' +
        'div.style.width=T+"px";div.style.height=T+"px";' +
        'div.style.backgroundImage="url(\\""+IMG+"\\")";' +
        'div.style.backgroundSize=BOARD+"px "+BOARD+"px";' +
        'div.style.backgroundPosition="-"+(id%COLS*T)+"px -"+(Math.floor(id/COLS)*T)+"px";' +
        '(function(i){div.addEventListener("click",function(){clickTile(i);});})(id);' +
        'board.appendChild(div);' +
      '}}' +
    'function render(animate){' +
      'var board=$("board");' +
      'for(var id=0;id<E;id++){' +
        'var pos=state.indexOf(id);' +
        'var el=board.querySelector("[data-id=\\""+id+"\\"]");' +
        'if(!el)continue;' +
        'el.style.transition=animate?"transform 0.13s cubic-bezier(0.25,0.46,0.45,0.94)":"none";' +
        'el.style.transform="translate("+(CC(pos)*T)+"px,"+(RR(pos)*T)+"px)";' +
      '}}' +
    'function clickTile(id){' +
      'var tp=state.indexOf(id),ep=state.indexOf(E);' +
      'if(!nb(ep).includes(tp))return;' +
      'var tmp=state[ep];state[ep]=state[tp];state[tp]=tmp;' +
      'moves++;$("mc").textContent=moves;render(true);' +
      'if(solved())setTimeout(celebrate,160);}' +
    'function startTimer(){startTime=Date.now();timerID=setInterval(function(){var sec=Math.floor((Date.now()-startTime)/1000);$("tm").textContent=String(Math.floor(sec/60)).padStart(2,"0")+":"+String(sec%60).padStart(2,"0");},500);}' +
    'function stopTimer(){clearInterval(timerID);timerID=null;}' +
    'function elStr(){var sec=Math.floor((Date.now()-startTime)/1000);var m=Math.floor(sec/60);return m?m+"分 "+(sec%60)+"秒":sec+"秒";}' +
    'function celebrate(){' +
      'stopTimer();' +
      '$("cel-img").src=IMG;$("cel-img").style.display="block";' +
      '$("result").innerHTML="<strong>"+moves+"</strong> 手 ／ <strong>"+elStr()+"</strong> でクリア！🎉";' +
      '$("cel").style.display="flex";' +
      'startConfetti();}' +
    'var COLS2=["#a78bfa","#ec4899","#34d399","#60a5fa","#fbbf24","#f87171","#38bdf8","#fb923c"];' +
    'function startConfetti(){' +
      'var canvas=$("cc");canvas.width=window.innerWidth;canvas.height=window.innerHeight;' +
      'var ctx=canvas.getContext("2d"),ps=[];' +
      'for(var i=0;i<200;i++)ps.push({x:Math.random()*canvas.width,y:-30-Math.random()*400,vx:(Math.random()-.5)*5,vy:1.8+Math.random()*4,w:7+Math.random()*10,h:4+Math.random()*7,rot:Math.random()*Math.PI*2,rv:(Math.random()-.5)*.2,color:COLS2[Math.floor(Math.random()*COLS2.length)]});' +
      'function draw(){ctx.clearRect(0,0,canvas.width,canvas.height);ps.forEach(function(p){p.x+=p.vx;p.y+=p.vy;p.vy+=.06;p.rot+=p.rv;if(p.y>canvas.height+20){p.y=-20;p.x=Math.random()*canvas.width;p.vy=1.8+Math.random()*4;}ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot);ctx.fillStyle=p.color;ctx.globalAlpha=.88;ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);ctx.restore();});confID=requestAnimationFrame(draw);}' +
      'draw();}' +
    'function savePhoto(){' +
      'var a=document.createElement("a");' +
      'a.href=IMG;a.download="photo.jpg";' +
      'document.body.appendChild(a);a.click();document.body.removeChild(a);}' +
    'function replayShuffle(){' +
      '$("cel").style.display="none";' +
      'cancelAnimationFrame(confID);confID=null;' +
      'doShuffle();moves=0;$("mc").textContent="0";$("tm").textContent="00:00";' +
      'stopTimer();startTimer();render(false);}' +
    'window.addEventListener("DOMContentLoaded",function(){' +
      '$("gb").textContent=C+"×"+C;' +
      '$("thumb").src=IMG;' +
      'buildBoard();doShuffle();' +
      'moves=0;$("mc").textContent="0";$("tm").textContent="00:00";' +
      'startTimer();render(false);});';

  return '<!DOCTYPE html>\n<html lang="ja">\n<head>\n' +
    '<meta charset="UTF-8">\n' +
    '<meta name="viewport" content="width=device-width,initial-scale=1.0">\n' +
    '<title>フォトスライドパズル</title>\n' +
    '<style>' + css + '</style>\n' +
    '</head>\n<body>\n' + body + '\n' +
    '<script>' + js + '<\/script>\n' +
    '</body>\n</html>';
}

// ── イベント登録 ──────────────────────────────

$('select-btn').addEventListener('click', () => $('file-input').click());
$('file-input').addEventListener('change', e => {
  if (e.target.files[0]) loadImageFile(e.target.files[0]);
});

const dz = $('drop-zone');
dz.addEventListener('click', e => { if (!e.target.closest('#select-btn')) $('file-input').click(); });
dz.addEventListener('dragover',  e => { e.preventDefault(); dz.classList.add('dragover'); });
dz.addEventListener('dragleave', ()  => dz.classList.remove('dragover'));
dz.addEventListener('drop', e => {
  e.preventDefault(); dz.classList.remove('dragover');
  const f = e.dataTransfer.files[0];
  if (f && f.type.startsWith('image/')) loadImageFile(f);
});

// ここで遊ぶ
$('start-btn').addEventListener('click', () => {
  diffMode = 'play';
  $('diff-title').textContent = 'グリッドサイズを選択';
  $('diff-sub').textContent = '大きいほど難しくなります';
  $('diff-modal').style.display = 'flex';
});

// LINEで送る
$('share-btn').addEventListener('click', () => {
  diffMode = 'share';
  $('diff-title').textContent = 'パズルのサイズを選択';
  $('diff-sub').textContent = '相手に解いてもらう難しさを選んでください';
  $('diff-modal').style.display = 'flex';
});

// 難易度ボタン
document.querySelectorAll('.diff-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const cols = Number(btn.dataset.cols);
    $('diff-modal').style.display = 'none';
    if (diffMode === 'play') {
      setDifficulty(cols);
      startGame();
    } else {
      generatePuzzleFile(cols);
    }
  });
});

$('diff-modal').addEventListener('click', e => {
  if (e.target === $('diff-modal')) $('diff-modal').style.display = 'none';
});

$('share-close-btn').addEventListener('click', () => {
  $('share-modal').style.display = 'none';
});

$('shuffle-btn').addEventListener('click', () => {
  shuffleState(); resetStats(); renderBoard(false);
});

$('back-btn').addEventListener('click', () => {
  stopTimer(); showScreen('screen-select');
});

$('play-again-btn').addEventListener('click', () => {
  hideCelebration(); shuffleState(); resetStats(); renderBoard(false);
});

$('new-photo-btn').addEventListener('click', () => {
  hideCelebration(); stopTimer();
  $('preview-area').style.display = 'none';
  $('file-input').value = '';
  showScreen('screen-select');
});
</script>
</body>
</html>
