<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>フォトスライドパズル</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root { --board: 480px; }

body {
  font-family: 'Segoe UI', Meiryo, sans-serif;
  background: linear-gradient(160deg, #daf5ff 0%, #b8e8ff 100%);
  color: #1e4060;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

.screen { display: none; flex-direction: column; align-items: center; gap: 24px; padding: 32px 16px; }
.screen.active { display: flex; }

h1 {
  font-size: 2rem;
  white-space: nowrap;
  background: linear-gradient(135deg, #0ea5e9, #06b6d4);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.subtitle { color: #5b8aa0; font-size: 0.95rem; }

.drop-zone {
  width: min(340px, calc(100vw - 48px)); height: 210px;
  border: 2px dashed #7dd3fc;
  border-radius: 18px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  transition: border-color 0.2s, background 0.2s;
}
.drop-zone:hover, .drop-zone.dragover {
  border-color: #0ea5e9;
  background: rgba(14,165,233,0.07);
}
.drop-inner { display: flex; flex-direction: column; align-items: center; gap: 10px; text-align: center; }
.drop-icon  { font-size: 3.2rem; }
.drop-hint  { color: #5b8aa0; font-size: 0.88rem; line-height: 1.7; }

#preview-area { flex-direction: column; align-items: center; gap: 16px; }
#preview-img {
  width: 280px; height: 280px;
  object-fit: cover; border-radius: 14px;
  border: 3px solid #0ea5e9;
  box-shadow: 0 0 24px rgba(14,165,233,0.35);
}
.preview-btns { display: flex; gap: 12px; }

/* ===================== 難易度モーダル ===================== */
#diff-modal {
  position: fixed; inset: 0;
  display: flex; align-items: center; justify-content: center;
  z-index: 200;
  background: rgba(0,40,80,0.5);
  backdrop-filter: blur(6px);
}
.diff-card {
  background: rgba(255,255,255,0.98);
  border: 2px solid #0ea5e9;
  border-radius: 24px;
  padding: 40px 48px;
  display: flex; flex-direction: column; align-items: center; gap: 20px;
  animation: pop-in 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
  box-shadow: 0 0 60px rgba(14,165,233,0.15), 0 20px 50px rgba(0,0,0,0.15);
}
.diff-card h2 { font-size: 1.5rem; font-weight: 700; color: #1e4060; }
.diff-card > p { color: #5b8aa0; font-size: 0.88rem; margin-top: -8px; }
.diff-options  { display: flex; gap: 16px; }
.diff-btn {
  display: flex; flex-direction: column; align-items: center; gap: 8px;
  width: 112px; padding: 20px 12px;
  background: #f0f9ff;
  border: 2px solid #bae6fd !important;
  border-radius: 16px !important;
  cursor: pointer;
  transition: all 0.2s !important;
}
.diff-btn:hover {
  border-color: #0ea5e9 !important;
  background: rgba(14,165,233,0.1) !important;
  transform: translateY(-6px) !important;
  filter: none !important;
  box-shadow: 0 10px 28px rgba(14,165,233,0.2);
}
.diff-btn:active { transform: translateY(-2px) !important; filter: none !important; }
.diff-recommended { border-color: #0ea5e9 !important; background: rgba(14,165,233,0.08) !important; }
.diff-emoji  { font-size: 2.2rem; pointer-events: none; }
.diff-size   { font-size: 1.45rem; font-weight: 700; color: #0284c7; pointer-events: none; }
.diff-name   { font-size: 0.82rem; font-weight: 600; color: #1e4060; pointer-events: none; }
.diff-pieces { font-size: 0.73rem; color: #5b8aa0; pointer-events: none; }
.diff-rec-badge {
  font-size: 0.63rem; font-weight: 700;
  background: linear-gradient(135deg, #0ea5e9, #06b6d4);
  color: #fff; padding: 2px 8px; border-radius: 10px;
  pointer-events: none;
}

/* ===================== シェア確認モーダル ===================== */
#share-modal {
  position: fixed; inset: 0;
  display: flex; align-items: center; justify-content: center;
  z-index: 250;
  background: rgba(0,40,80,0.5);
  backdrop-filter: blur(6px);
}
.share-card {
  background: rgba(255,255,255,0.98);
  border: 2px solid #06C755;
  border-radius: 24px;
  padding: 40px 48px;
  display: flex; flex-direction: column; align-items: center; gap: 20px;
  animation: pop-in 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
  box-shadow: 0 0 60px rgba(6,199,85,0.15), 0 20px 50px rgba(0,0,0,0.15);
  max-width: 400px; text-align: center;
}
.share-card h2 { font-size: 1.5rem; color: #1e4060; }
.share-generating { color: #5b8aa0; font-size: 1rem; }
.share-steps {
  background: #f0f9ff;
  border-radius: 12px;
  padding: 16px 20px;
  text-align: left;
  width: 100%;
  display: flex; flex-direction: column; gap: 10px;
}
.share-steps p { font-size: 0.9rem; color: #1e4060; display: flex; gap: 8px; align-items: flex-start; }
.share-steps .step-num {
  background: #06C755; color: #fff;
  font-weight: 700; font-size: 0.75rem;
  min-width: 20px; height: 20px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; margin-top: 1px;
}
.share-note { color: #5b8aa0; font-size: 0.8rem; line-height: 1.6; }
.share-filename {
  background: #f0f9ff; border: 1px solid #bae6fd;
  border-radius: 8px; padding: 8px 16px;
  font-family: monospace; color: #0284c7; font-size: 0.95rem;
}

/* ===================== ゲーム画面 ===================== */
.game-wrapper { display: flex; flex-direction: column; gap: 16px; }
.game-header {
  display: flex; align-items: center; justify-content: space-between;
  width: calc(var(--board) + 148px);
}
.stats { display: flex; gap: 24px; align-items: center; font-size: 0.95rem; }
.stats strong { color: #0284c7; font-size: 1.3rem; }
.grid-badge {
  background: rgba(14,165,233,0.15);
  border: 1px solid rgba(14,165,233,0.4);
  color: #0284c7; padding: 3px 13px;
  border-radius: 20px; font-size: 0.85rem; font-weight: 700;
}
.g-controls { display: flex; gap: 8px; }
.game-area { display: flex; gap: 20px; align-items: flex-start; }

#puzzle-board {
  position: relative;
  width: var(--board); height: var(--board);
  background: #1e3a5f;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 16px 48px rgba(0,0,0,0.3);
  flex-shrink: 0;
}
.tile {
  position: absolute; left: 0; top: 0;
  cursor: pointer;
  will-change: transform;
  transition: transform 0.13s cubic-bezier(0.25,0.46,0.45,0.94);
  outline: 1.5px solid rgba(255,255,255,0.07);
}
.tile:hover  { filter: brightness(1.14) drop-shadow(0 0 6px rgba(14,165,233,0.5)); }
.tile:active { filter: brightness(0.92); }

.preview-panel { display: flex; flex-direction: column; align-items: center; gap: 6px; }
.preview-label { font-size: 0.72rem; color: #5b8aa0; letter-spacing: 0.06em; text-transform: uppercase; }
#thumb-img {
  width: 128px; height: 128px;
  object-fit: cover; border-radius: 10px;
  border: 2px solid #bae6fd;
}

/* ===================== お祝い ===================== */
#celebration {
  position: fixed; inset: 0;
  display: flex; align-items: center; justify-content: center;
  z-index: 300; background: rgba(0,40,80,0.2);
  overflow-y: auto;
}
#confetti-canvas { position: absolute; inset: 0; pointer-events: none; }
.cel-card {
  position: relative;
  background: rgba(255,255,255,0.98);
  border: 2px solid #0ea5e9;
  border-radius: 26px;
  padding: 40px 52px;
  text-align: center;
  display: flex; flex-direction: column; align-items: center; gap: 14px;
  animation: pop-in 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
  box-shadow: 0 0 80px rgba(14,165,233,0.25), 0 24px 60px rgba(0,0,0,0.2);
  max-width: calc(100vw - 32px);
}
.cel-emoji { font-size: 4rem; animation: bob 0.7s ease-in-out infinite alternate; }
.cel-card h2 { font-size: 2.4rem; font-weight: 700; color: #1e4060; }
.cel-stats { color: #5b8aa0; font-size: 1.05rem; line-height: 2.1; }
.cel-stats strong { color: #0284c7; }
#cel-photo {
  width: 200px; height: 200px;
  object-fit: cover; border-radius: 14px;
  border: 3px solid #0ea5e9;
  box-shadow: 0 0 24px rgba(14,165,233,0.35);
  display: none;
}
.cel-buttons { display: flex; gap: 12px; margin-top: 10px; flex-wrap: wrap; justify-content: center; }

/* ===================== ランキング ===================== */
.rank-divider { width: 100%; border: none; border-top: 1px solid #bae6fd; margin: 4px 0; }
.rank-input-row { display: flex; gap: 8px; width: 100%; }
.rank-input-row input {
  flex: 1; padding: 10px 12px;
  border: 2px solid #bae6fd; border-radius: 10px;
  font-size: 0.95rem; color: #1e4060; outline: none;
  font-family: inherit;
}
.rank-input-row input:focus { border-color: #0ea5e9; }
.rank-skip { background: none; border: none; color: #94a3b8; font-size: 0.78rem; cursor: pointer; padding: 2px 0; }
.rank-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; margin-top: 8px; }
.rank-table th { background: #e0f2fe; color: #1e4060; padding: 7px 8px; }
.rank-table td { padding: 7px 8px; text-align: center; border-bottom: 1px solid #e8f4fd; color: #1e4060; }
.rank-table tr.my-rank td { background: rgba(14,165,233,0.12); font-weight: 700; color: #0284c7; }
.rank-msg { font-size: 0.88rem; font-weight: 700; color: #0284c7; margin-bottom: 4px; }

@keyframes pop-in {
  from { transform: scale(0.3) rotate(-8deg); opacity: 0; }
  to   { transform: scale(1)   rotate(0deg);  opacity: 1; }
}
@keyframes bob {
  from { transform: translateY(0); }
  to   { transform: translateY(-14px); }
}

/* ===================== モバイル対応 ===================== */
@media (max-width: 560px) {
  .game-header { width: var(--board); flex-wrap: wrap; gap: 8px; }
  .game-area   { flex-direction: column; align-items: center; }
  .preview-panel { flex-direction: row; gap: 12px; align-items: center; }
  .diff-card   { padding: 24px 16px; width: calc(100vw - 32px); }
  .diff-options { gap: 8px; }
  .diff-btn    { width: 88px; padding: 14px 6px; }
  .share-card  { padding: 24px 16px; width: calc(100vw - 32px); }
  .cel-card    { padding: 32px 20px; width: calc(100vw - 32px); }
  .cel-card h2 { font-size: 1.8rem; }
  .cel-buttons { flex-direction: column; width: 100%; }
  .cel-buttons button { width: 100%; }
}

/* ===================== ボタン共通 ===================== */
button {
  padding: 10px 22px; border: none; border-radius: 10px;
  font-size: 0.95rem; font-weight: 600; cursor: pointer;
  transition: transform 0.1s, filter 0.15s;
}
button:hover  { filter: brightness(1.12); transform: translateY(-2px); }
button:active { transform: translateY(0);  filter: brightness(0.94); }
.btn-primary { background: linear-gradient(135deg, #0ea5e9, #0284c7); color: #fff; }
.btn-success { background: linear-gradient(135deg, #34d399, #059669); color: #fff; }
.btn-dark    { background: #e0f2fe; color: #1e4060; border: 1px solid #7dd3fc; }
.btn-line    { background: #06C755; color: #fff; }
</style>
</head>
<body>

<!-- ========================================================
     画像選択画面
======================================================== -->
<div id="screen-select" class="screen active">
  <h1>📸 フォトスライドパズル</h1>
  <p class="subtitle">自分の写真でスライドパズルを楽しもう</p>

  <div class="drop-zone" id="drop-zone">
    <input type="file" id="file-input" accept="image/*" hidden>
    <div class="drop-inner">
      <div class="drop-icon">🖼️</div>
      <p class="drop-hint">写真をここにドラッグ＆ドロップ<br>または</p>
      <button type="button" class="btn-primary" id="select-btn">ファイルを選択</button>
    </div>
  </div>

  <div id="preview-area" style="display:none">
    <img id="preview-img" alt="選択した写真のプレビュー">
    <div class="preview-btns">
      <button type="button" class="btn-success" id="start-btn"
              style="padding:14px 28px;font-size:1rem;border-radius:28px">
        ▶ ここで遊ぶ
      </button>
      <button type="button" class="btn-line" id="share-btn"
              style="padding:14px 28px;font-size:1rem;border-radius:28px">
        📤 LINEで送る
      </button>

</div>

<!-- ========================================================
     難易度選択モーダル
======================================================== -->
<div id="diff-modal" style="display:none">
  <div class="diff-card">
    <h2 id="diff-title">グリッドサイズを選択</h2>
    <p id="diff-sub">大きいほど難しくなります</p>
    <div class="diff-options">
      <button type="button" class="diff-btn" data-cols="3">
        <span class="diff-emoji">😊</span>
        <span class="diff-size">3 × 3</span>
        <span class="diff-name">かんたん</span>
        <span class="diff-pieces">8 ピース</span>
      </button>
      <button type="button" class="diff-btn diff-recommended" data-cols="4">
        <span class="diff-emoji">🧩</span>
        <span class="diff-size">4 × 4</span>
        <span class="diff-name">ふつう</span>
        <span class="diff-pieces">15 ピース</span>
        <span class="diff-rec-badge">おすすめ</span>
      </button>
      <button type="button" class="diff-btn" data-cols="5">
        <span class="diff-emoji">🔥</span>
        <span class="diff-size">5 × 5</span>
        <span class="diff-name">むずかしい</span>
        <span class="diff-pieces">24 ピース</span>
      </button>
    </div>
  </div>
</div>

<!-- ========================================================
     シェア確認モーダル
======================================================== -->
<div id="share-modal" style="display:none">
  <div class="share-card">
    <div id="share-content">
      <p class="share-generating">⏳ パズルファイルを作成中...</p>
    </div>
    <button type="button" class="btn-dark" id="share-close-btn">閉じる</button>
  </div>
</div>

<!-- ========================================================
     ゲーム画面
======================================================== -->
<div id="screen-game" class="screen">
  <div class="game-wrapper">
    <div class="game-header">
      <div class="stats">
        <span class="grid-badge" id="grid-badge">4×4</span>
        <span>手数&thinsp;<strong id="move-count">0</strong></span>
        <span>時間&thinsp;<strong id="timer">00:00</strong></span>
      </div>
      <div class="g-controls">
        <button type="button" class="btn-primary" id="shuffle-btn">🔀 シャッフル</button>
        <button type="button" class="btn-dark"    id="back-btn">← 戻る</button>
      </div>
    </div>
    <div class="game-area">
      <div id="puzzle-board"></div>
      <div class="preview-panel">
        <span class="preview-label">完成図</span>
        <img id="thumb-img" alt="完成図">
      </div>
    </div>
  </div>
</div>

<!-- ========================================================
     お祝いオーバーレイ
======================================================== -->
<div id="celebration" style="display:none">
  <canvas id="confetti-canvas"></canvas>
  <div class="cel-card">
    <div class="cel-emoji">🎊</div>
    <h2>パズル完成！</h2>
    <p class="cel-stats" id="result-text"></p>
    <img id="cel-photo" alt="完成写真">
    <div class="cel-buttons">
      <button type="button" class="btn-primary" id="save-photo-btn">⬇ 写真を保存</button>

          <input type="text" id="player-name" placeholder="名前（10文字まで）" maxlength="10">
          <button type="button" class="btn-primary" id="submit-rank-btn" style="padding:10px 16px;white-space:nowrap">登録</button>
        </div>
        <button type="button" class="rank-skip" id="skip-rank-btn">スキップ →</button>
      </div>
      <div id="ranking-display" style="display:none;width:100%"></div>
    </div>

<script>
'use strict';

// ── Firebase ──────────────────────────────────
firebase.initializeApp({
  apiKey: "AIzaSyD1AdN1sZK2pQLZjmHRGJs8GZnDiawKkyc",
  authDomain: "slidepuzzle-79e89.firebaseapp.com",
  databaseURL: "https://slidepuzzle-79e89-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "slidepuzzle-79e89",
  storageBucket: "slidepuzzle-79e89.firebasestorage.app",
  messagingSenderId: "666868520258",
  appId: "1:666868520258:web:ed88e2fbe3526400ada4db"
});
const db = firebase.database();

function randomKey() {
  return Math.random().toString(36).slice(2, 10);
}

function savePuzzle(imgDataUrl, cols) {
  const key = randomKey();
  return db.ref('puzzles/' + key).set({ img: imgDataUrl, cols: cols, ts: Date.now() }).then(() => key);
}

function loadPuzzle(key) {
  return db.ref('puzzles/' + key).get().then(snap => snap.exists() ? snap.val() : null);
}

// ── LIFF ──────────────────────────────────────
const LIFF_ID = '2009936757-HcECEkM1';
if (typeof liff !== 'undefined') {
  liff.init({ liffId: LIFF_ID }).catch(() => {});
}

// ── 定数・変数 ────────────────────────────────
const BOARD_PX = Math.min(480, window.innerWidth - 32);
document.documentElement.style.setProperty('--board', BOARD_PX + 'px');
let COLS = 4, ROWS = 4, N = 16, EMPTY_ID = 15, TILE_PX = 120;

function setDifficulty(cols) {
  COLS = cols; ROWS = cols;
  N = cols * cols; EMPTY_ID = N - 1; TILE_PX = BOARD_PX / cols;
}

let state = [], imageUrl = '', moves = 0;
let startTime = null, timerID = null, confettiID = null;
let diffMode = 'play'; // 'play' | 'share'
let currentShareUrl = '';
let currentPuzzleId = null;
let completionSecs = 0;

// ── ユーティリティ ────────────────────────────
const $ = id => document.getElementById(id);
const r = pos => Math.floor(pos / COLS);
const c = pos => pos % COLS;

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  $(id).classList.add('active');
}

function neighbors(pos) {
  const res = [];
  if (r(pos) > 0)      res.push(pos - COLS);
  if (r(pos) < ROWS-1) res.push(pos + COLS);
  if (c(pos) > 0)      res.push(pos - 1);
  if (c(pos) < COLS-1) res.push(pos + 1);
  return res;
}

// ── 画像処理 ──────────────────────────────────
function loadImageFile(file) {
  const reader = new FileReader();
  reader.onload = evt => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      canvas.width = canvas.height = BOARD_PX;
      const ctx = canvas.getContext('2d');
      const dim = Math.min(img.width, img.height);
      ctx.drawImage(img, (img.width-dim)/2, (img.height-dim)/2, dim, dim, 0, 0, BOARD_PX, BOARD_PX);
      imageUrl = canvas.toDataURL('image/jpeg', 0.92);
      $('preview-img').src = imageUrl;
      $('preview-area').style.display = 'flex';
    };
    img.src = evt.target.result;
  };
  reader.readAsDataURL(file);
}

// ── パズル状態 ────────────────────────────────
function initSolved() { state = Array.from({length: N}, (_, i) => i); }

function shuffleState() {
  const steps = Math.max(80, N * 22);
  do {
    initSolved();
    let empty = state.indexOf(EMPTY_ID), prev = -1;
    for (let i = 0; i < steps; i++) {
      const nb = neighbors(empty).filter(p => p !== prev);
      const next = nb[(Math.random() * nb.length) | 0];
      [state[empty], state[next]] = [state[next], state[empty]];
      prev = empty; empty = next;
    }
  } while (isSolved());
}

function isSolved() { return state.every((id, pos) => id === pos); }

// ── タイル DOM ────────────────────────────────
function buildBoard() {
  const board = $('puzzle-board');
  board.innerHTML = '';
  for (let id = 0; id < EMPTY_ID; id++) {
    const div = document.createElement('div');
    div.className = 'tile';
    div.dataset.id = id;
    div.style.width  = TILE_PX + 'px';
    div.style.height = TILE_PX + 'px';
    div.style.backgroundImage    = 'url("' + imageUrl + '")';
    div.style.backgroundSize     = BOARD_PX + 'px ' + BOARD_PX + 'px';
    div.style.backgroundPosition = '-' + (id % COLS * TILE_PX) + 'px -' + (Math.floor(id / COLS) * TILE_PX) + 'px';
    div.addEventListener('click', () => clickTile(id));
    board.appendChild(div);
  }
}

function renderBoard(animate = true) {
  const board = $('puzzle-board');
  for (let id = 0; id < EMPTY_ID; id++) {
    const pos = state.indexOf(id);
    const el  = board.querySelector('[data-id="' + id + '"]');
    if (!el) continue;
    el.style.transition = animate ? 'transform 0.13s cubic-bezier(0.25,0.46,0.45,0.94)' : 'none';
    el.style.transform  = 'translate(' + (c(pos) * TILE_PX) + 'px,' + (r(pos) * TILE_PX) + 'px)';
  }
}

// ── クリック ──────────────────────────────────
function clickTile(id) {
  const tilePos = state.indexOf(id), emptyPos = state.indexOf(EMPTY_ID);
  if (!neighbors(emptyPos).includes(tilePos)) return;
  [state[emptyPos], state[tilePos]] = [state[tilePos], state[emptyPos]];
  moves++;
  $('move-count').textContent = moves;
  renderBoard(true);
  if (isSolved()) setTimeout(celebrate, 160);
}

// ── ゲーム開始 ────────────────────────────────
function startGame() {
  $('grid-badge').textContent = COLS + '×' + COLS;
  $('thumb-img').src = imageUrl;
  buildBoard(); shuffleState(); resetStats(); renderBoard(false);
  showScreen('screen-game');
}

function resetStats() {
  moves = 0;
  $('move-count').textContent = '0';
  $('timer').textContent = '00:00';
  stopTimer(); startTimer();
}

// ── タイマー ──────────────────────────────────
function startTimer() {
  startTime = Date.now();
  timerID = setInterval(() => {
    const sec = ((Date.now() - startTime) / 1000) | 0;
    $('timer').textContent =
      String((sec / 60) | 0).padStart(2, '0') + ':' + String(sec % 60).padStart(2, '0');
  }, 500);
}
function stopTimer() { clearInterval(timerID); timerID = null; }
function elapsedStr() {
  const sec = ((Date.now() - startTime) / 1000) | 0;
  const m = (sec / 60) | 0;
  return m ? m + '分 ' + (sec % 60) + '秒' : sec + '秒';
}

// ── お祝い ────────────────────────────────────
function celebrate() {
  stopTimer();
  completionSecs = ((Date.now() - startTime) / 1000) | 0;
  $('result-text').innerHTML =
    '<strong>' + moves + '</strong> 手 ／ <strong>' + elapsedStr() + '</strong> でクリア！🎉';
  $('cel-photo').src = imageUrl;
  $('cel-photo').style.display = 'block';
  $('celebration').style.display = 'flex';
  startConfetti();

  if (currentPuzzleId) {
    $('ranking-section').style.display = 'block';
    $('ranking-input').style.display = 'none';
    $('ranking-display').style.display = 'none';
    $('player-name').value = '';
    $('submit-rank-btn').disabled = false;
    $('submit-rank-btn').textContent = '登録';

    loadRankings().then(rankings => {
      const worst = rankings[9];
      const qualifies = !worst ||
        completionSecs < worst.secs ||
        (completionSecs === worst.secs && moves < worst.moves);
      if (qualifies) {
        $('ranking-input').style.display = 'block';
      } else {
        showRankingDisplay(rankings, null, null);
      }

}
function hideCelebration() {
  $('celebration').style.display = 'none';
  $('cel-photo').style.display = 'none';
  $('ranking-section').style.display = 'none';

function savePhoto() {
  fetch(imageUrl)
    .then(r => r.blob())
    .then(blob => {
      const file = new File([blob], 'photo.jpg', { type: 'image/jpeg' });
      if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
        return navigator.share({ files: [file], title: 'パズル完成！' });
      }
      throw new Error('fallback');
    })
    .catch(() => {
      const a = document.createElement('a');
      a.href = imageUrl;
      a.download = 'photo.jpg';
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
    });

// ── コンフェッティ ────────────────────────────
const C_COLORS = ['#a78bfa','#ec4899','#34d399','#60a5fa','#fbbf24','#f87171','#38bdf8','#fb923c'];

function startConfetti() {
  const canvas = $('confetti-canvas');
  canvas.width = window.innerWidth; canvas.height = window.innerHeight;
  const ctx = canvas.getContext('2d');
  const ps = Array.from({length: 220}, () => ({
    x: Math.random() * canvas.width, y: -30 - Math.random() * 400,
    vx: (Math.random() - 0.5) * 5, vy: 1.8 + Math.random() * 4,
    w: 7 + Math.random() * 10, h: 4 + Math.random() * 7,
    rot: Math.random() * Math.PI * 2, rv: (Math.random() - 0.5) * 0.2,
    color: C_COLORS[(Math.random() * C_COLORS.length) | 0],
  }));
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ps.forEach(p => {
      p.x += p.vx; p.y += p.vy; p.vy += 0.06; p.rot += p.rv;
      if (p.y > canvas.height + 20) { p.y = -20; p.x = Math.random() * canvas.width; p.vy = 1.8 + Math.random() * 4; }
      ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.rot);
      ctx.fillStyle = p.color; ctx.globalAlpha = 0.88;
      ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
      ctx.restore();
    });
    confettiID = requestAnimationFrame(draw);
  }
  draw();
}
function stopConfetti() { cancelAnimationFrame(confettiID); confettiID = null; }

// ── ランキング ────────────────────────────────

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function secsToStr(s) {
  return String((s/60)|0).padStart(2,'0') + ':' + String(s%60).padStart(2,'0');
}

function loadRankings() {
  return db.ref('puzzles/' + currentPuzzleId + '/rankings').once('value').then(snap => {
    const list = [];
    snap.forEach(child => list.push({ id: child.key, ...child.val() }));
    return list.sort((a, b) => a.secs - b.secs || a.moves - b.moves).slice(0, 10);
  });
}

function showRankingDisplay(rankings, highlightName, highlightSecs) {
  const medals = ['🥇','🥈','🥉'];
  let msg = '';
  const myIdx = rankings.findIndex(r => r.name === highlightName && r.secs === highlightSecs);
  if (highlightName && myIdx >= 0) {
    msg = '<p class="rank-msg">🎉 ' + (myIdx + 1) + '位でランクイン！</p>';
  } else if (highlightName) {
    msg = '<p style="font-size:0.85rem;color:#5b8aa0">今回はランク外でした</p>';
  }
  let rows = '';
  rankings.forEach((r, i) => {
    const isMe = r.name === highlightName && r.secs === highlightSecs;
    rows += '<tr' + (isMe ? ' class="my-rank"' : '') + '>' +
      '<td>' + (medals[i] || (i+1)+'位') + '</td>' +
      '<td>' + escapeHtml(r.name) + '</td>' +
      '<td>' + secsToStr(r.secs) + '</td>' +
      '<td>' + r.moves + '手</td></tr>';
  });
  $('ranking-display').innerHTML = msg +
    '<table class="rank-table"><thead><tr><th>順位</th><th>名前</th><th>タイム</th><th>手数</th></tr></thead>' +
    '<tbody>' + rows + '</tbody></table>';
  $('ranking-input').style.display = 'none';
  $('ranking-display').style.display = 'block';
}

function submitRanking() {
  const name = $('player-name').value.trim();
  if (!name) { $('player-name').focus(); return; }
  const btn = $('submit-rank-btn');
  btn.disabled = true; btn.textContent = '登録中...';

  const entry = { name, secs: completionSecs, moves, ts: Date.now() };
  const newKey = 'r' + Date.now() + '_' + Math.floor(Math.random() * 9999);

  loadRankings()
    .then(existing => {
      const all = [...existing, entry].sort((a, b) => a.secs - b.secs || a.moves - b.moves);
      const updates = {};
      updates['puzzles/' + currentPuzzleId + '/rankings/' + newKey] = entry;
      all.slice(10).forEach(r => {
        if (r.id) updates['puzzles/' + currentPuzzleId + '/rankings/' + r.id] = null;
      });
      return db.ref().update(updates).then(() => loadRankings());
    })
    .then(rankings => showRankingDisplay(rankings, name, completionSecs))
    .catch(() => {
      btn.disabled = false; btn.textContent = '登録';
      alert('登録に失敗しました');
    });
}

  img.src = dataUrl;

      'document.body.appendChild(a);a.click();document.body.removeChild(a);}' +
    'function replayShuffle(){' +
      '$("cel").style.display="none";' +
      'cancelAnimationFrame(confID);confID=null;' +
      'doShuffle();moves=0;$("mc").textContent="0";$("tm").textContent="00:00";' +
      'stopTimer();startTimer();render(false);}' +
    'window.addEventListener("DOMContentLoaded",function(){' +
      '$("gb").textContent=C+"×"+C;' +
      '$("thumb").src=IMG;' +
      'buildBoard();doShuffle();' +
      'moves=0;$("mc").textContent="0";$("tm").textContent="00:00";' +
      'startTimer();render(false);});';

  return '<!DOCTYPE html>\n<html lang="ja">\n<head>\n' +
    '<meta charset="UTF-8">\n' +
    '<meta name="viewport" content="width=device-width,initial-scale=1.0">\n' +
    '<title>フォトスライドパズル</title>\n' +
    '<style>' + css + '</style>\n' +
    '</head>\n<body>\n' + body + '\n' +
    '<script>' + js + '<\/script>\n' +
    '</body>\n</html>';
}

// ── イベント登録 ──────────────────────────────

$('select-btn').addEventListener('click', () => $('file-input').click());
$('file-input').addEventListener('change', e => {
  if (e.target.files[0]) loadImageFile(e.target.files[0]);
});

const dz = $('drop-zone');
dz.addEventListener('click', e => { if (!e.target.closest('#select-btn')) $('file-input').click(); });
dz.addEventListener('dragover',  e => { e.preventDefault(); dz.classList.add('dragover'); });
dz.addEventListener('dragleave', ()  => dz.classList.remove('dragover'));
dz.addEventListener('drop', e => {
  e.preventDefault(); dz.classList.remove('dragover');
  const f = e.dataTransfer.files[0];
  if (f && f.type.startsWith('image/')) loadImageFile(f);
});

// ここで遊ぶ
$('start-btn').addEventListener('click', () => {
  diffMode = 'play';
  $('diff-title').textContent = 'グリッドサイズを選択';
  $('diff-sub').textContent = '大きいほど難しくなります';
  $('diff-modal').style.display = 'flex';
});

// LINEで送る
$('share-btn').addEventListener('click', () => {
  diffMode = 'share';
  $('diff-title').textContent = 'パズルのサイズを選択';
  $('diff-sub').textContent = '相手に解いてもらう難しさを選んでください';
  $('diff-modal').style.display = 'flex';
});

// 難易度ボタン
document.querySelectorAll('.diff-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const cols = Number(btn.dataset.cols);
    $('diff-modal').style.display = 'none';
    if (diffMode === 'play') {
      setDifficulty(cols);
      startGame();
    } else {
      sharePuzzleUrl(cols);
    }
  });
});

$('diff-modal').addEventListener('click', e => {
  if (e.target === $('diff-modal')) $('diff-modal').style.display = 'none';
});

$('share-close-btn').addEventListener('click', () => {
  $('share-modal').style.display = 'none';
});

$('shuffle-btn').addEventListener('click', () => {
  shuffleState(); resetStats(); renderBoard(false);
});

$('back-btn').addEventListener('click', () => {
  stopTimer(); showScreen('screen-select');
});

$('save-photo-btn').addEventListener('click', savePhoto);
$('submit-rank-btn').addEventListener('click', submitRanking);
$('player-name').addEventListener('keydown', e => { if (e.key === 'Enter') submitRanking(); });
$('skip-rank-btn').addEventListener('click', () => {
  loadRankings().then(r => showRankingDisplay(r, null, null));
});

$('play-again-btn').addEventListener('click', () => {
  hideCelebration(); shuffleState(); resetStats(); renderBoard(false);
});


checkUrlParam();
</script>
